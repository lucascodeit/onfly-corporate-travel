services:
  api-app:
    build:
      context: ./api
      dockerfile: Dockerfile
    profiles: ["api"]
    container_name: onfly-api-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./api:/var/www
      - /var/www/vendor
    networks:
      - onfly-network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=onfly
      - DB_USERNAME=onfly
      - DB_PASSWORD=secret

  api-nginx:
    image: nginx:1.27-alpine
    profiles: ["api"]
    container_name: onfly-api-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www
      - ./api/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - onfly-network
    depends_on:
      - api-app

  mysql:
    image: mysql:8.4
    profiles: ["api"]
    container_name: onfly-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: onfly
      MYSQL_USER: onfly
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - onfly-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    profiles: ["front"]
    container_name: onfly-front
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./front:/app
      - /app/node_modules
    networks:
      - onfly-network

networks:
  onfly-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
